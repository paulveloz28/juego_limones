<!DOCTYPE html>
<html>
<head>
  <title>Atrapar Limones</title>
  <link rel="stylesheet" href="limones.css"/>
  <script src="utils.js"></script>
</head>
<body onload="iniciar()">
  <div class="contenedor">

  <header class="header">
  <div class="titulo-con-logo">
    <h1>🍋 Atrapar Limones</h1>
    <img src="logoAtary.jpg" alt="Logo Atari" class="logo-atari">
  </div>

  <p class="subtitulo">Si del cielo te caen limones... ¡atrápalos!</p>
  <h3 class="autor">Autor: Jonathan Veloz</h3>
</header>

    <div class="game-card">
      <canvas id="areaJuego" width="600" height="400"></canvas>

      <div class="panel">
        <div class="info">
          <p>Puntaje</p>
          <span id="txtPuntaje">0</span>
        </div>

        <div class="info">
          <p>Vidas</p>
          <span id="txtVidas">3</span>
        </div>
      </div>

      <div class="botones">
        <button onclick="moverIzquierda()">◀</button>
        <button onclick="moverDerecha()">▶</button>
        <button class="btn-reiniciar" onclick="reiniciar()">⟳</button>
      </div>
    </div>

  </div>

  <script src="limones.js"></script>
</body>
</html>
